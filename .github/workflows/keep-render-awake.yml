name: Keep Render Awake

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://my-personal-blog-areb.onrender.com/api/posts?populate=*&sort[0]=publishedAt:desc"
